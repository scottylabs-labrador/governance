[project]
name = "governance"
version = "0.1.0"
readme = "README.md"
requires-python = ">=3.14"
dependencies = []

[dependency-groups]
dev = ["mypy>=1.19.1", "ruff>=0.15.5", "ty>=0.0.20"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["meta/validators", "meta/linter"]
include = ["meta/*"]

[project.scripts]
validate = "validators:main"
lint = "linter:main"

[tool.ruff]
lint.select = ["ALL"]

[tool.mypy]
strict = true
