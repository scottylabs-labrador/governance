[project]
name = "governance"
version = "0.1.0"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
  "colorama>=0.4.6",
  "dotenv>=0.9.9",
  "httpx>=0.28.1",
  "pydantic>=2.12.5",
  "pygithub>=2.9.0",
  "tomli>=2.4.0",
]

[dependency-groups]
dev = [
  "mypy>=1.19.1",
  "ruff>=0.15.5",
  "ty>=0.0.20",
  "types-colorama>=0.4.15.20250801",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["meta/validator", "meta/linter"]
include = ["meta/*"]

[project.scripts]
validate = "validators:main"
lint = "linter:main"
sync-github = "synchronizers.github_synchronizer:main"

[tool.ruff]
lint.select = ["ALL"]

[tool.mypy]
strict = true
explicit_package_bases = true
