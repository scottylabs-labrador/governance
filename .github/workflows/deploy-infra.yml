name: OpenTofu Apply

on:
  push:
    branches:
      - main

jobs:
  apply:
    name: Apply Infrastructure
    runs-on: ubuntu-latest

    env:
      # --- S3 backend credentials ---
      S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
      S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
      S3_REGION: ${{ secrets.S3_REGION }}
      S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}

      # --- Backend configuration ---
      TF_BACKEND_BUCKET: ${{ secrets.TF_BACKEND_BUCKET }}
      TF_BACKEND_KEY: ${{ secrets.TF_BACKEND_KEY }}

      # --- Sensitive runtime variables ---
      TF_VAR_cmu_ldap_bind_credential: ${{ secrets.TF_VAR_CMU_LDAP_BIND_CREDENTIAL }}
      TF_VAR_keycloak_client_id: ${{ secrets.TF_VAR_KEYCLOAK_CLIENT_ID }}
      TF_VAR_keycloak_client_secret: ${{ secrets.TF_VAR_KEYCLOAK_CLIENT_SECRET }}
      TF_VAR_vault_token: ${{ secrets.TF_VAR_VAULT_TOKEN }}
      TF_VAR_github_token: ${{ secrets.TF_VAR_GITHUB_TOKEN }}
      TF_VAR_github_client_id: ${{ secrets.TF_VAR_GITHUB_CLIENT_ID }}
      TF_VAR_github_client_secret: ${{ secrets.TF_VAR_GITHUB_CLIENT_SECRET }}
      TF_VAR_slack_client_id: ${{ secrets.TF_VAR_SLACK_CLIENT_ID }}
      TF_VAR_slack_client_secret: ${{ secrets.TF_VAR_SLACK_CLIENT_SECRET }}

    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Initialize backend
        run: |
          tofu init \
            -backend-config="bucket=$TF_BACKEND_BUCKET" \
            -backend-config="key=$TF_BACKEND_KEY" \
            -backend-config="region=$S3_REGION" \
            -backend-config="endpoint=$S3_ENDPOINT" \
            -backend-config="access_key=$S3_ACCESS_KEY_ID" \
            -backend-config="secret_key=$S3_SECRET_ACCESS_KEY" \

      - name: Validate configuration
        run: tofu validate

      - name: Check configuration formatting
        run: tofu fmt -check -diff

      - name: Plan infrastructure
        run: tofu plan
